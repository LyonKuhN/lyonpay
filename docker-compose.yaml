version: '3.8'

services:
  lyonpay-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - PORT=3005
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    restart: always

  lyonpay-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - lyonpay-api
    restart: always
